# Fly.io deploy for the Pensive webhook server (strand.wf infrastructure).
# Deploy: flyctl deploy   Secrets: OPENROUTER_API_KEY, GITHUB_APP_ID,
# GITHUB_WEBHOOK_SECRET, GITHUB_APP_PRIVATE_KEY (pem contents).
app = "pensive-strand"
primary_region = "arn"

[build]

[env]
  PENSIVE_PORT = "3000"
  PENSIVE_PUBLIC_URL = "https://pensive.strand.wf"

[http_service]
  internal_port = 3000
  force_https = true
  # Reviews run off the request path (202 + queue); auto-stop would kill them mid-flight.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "pensive_data"
  destination = "/app/.pensive"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
